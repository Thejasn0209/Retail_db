name: Retail_db — SQL Database CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/Retail_db/Retail_db.sqlproj/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'

jobs:
  build:
    name: Build & Validate SQL Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore NuGet packages
        run: dotnet restore src/Retail_db/Retail_db.sqlproj

      - name: Build SQL Project
        run: dotnet build src/Retail_db/Retail_db.sqlproj --configuration Release

      - name: Upload dacpac artifact
        uses: actions/upload-artifact@v4
        with:
          name: dacpac
          path: '**/*.dacpac'
          retention-days: 30

  deploy_development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download dacpac artifact
        uses: actions/download-artifact@v4
        with:
          name: dacpac

      - name: Install SqlPackage
        run: dotnet tool install --global microsoft.sqlpackage

      - name: Deploy to Development
        run: |
          sqlpackage /Action:Publish \
            /SourceFile:*.dacpac \
            /TargetConnectionString:"${{ secrets.DEVELOPMENT_CONNECTION_STRING }}" \
            /p:BlockOnPossibleDataLoss=true

  deploy_uat:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    needs: deploy_development
    steps:
      - name: Download dacpac artifact
        uses: actions/download-artifact@v4
        with:
          name: dacpac

      - name: Install SqlPackage
        run: dotnet tool install --global microsoft.sqlpackage

      - name: Deploy to UAT
        run: |
          sqlpackage /Action:Publish \
            /SourceFile:*.dacpac \
            /TargetConnectionString:"${{ secrets.UAT_CONNECTION_STRING }}" \
            /p:BlockOnPossibleDataLoss=true

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy_uat
    environment: Production
    steps:
      - name: Download dacpac artifact
        uses: actions/download-artifact@v4
        with:
          name: dacpac

      - name: Install SqlPackage
        run: dotnet tool install --global microsoft.sqlpackage

      - name: Deploy to Production
        run: |
          sqlpackage /Action:Publish \
            /SourceFile:*.dacpac \
            /TargetConnectionString:"${{ secrets.PRODUCTION_CONNECTION_STRING }}" \
            /p:BlockOnPossibleDataLoss=true

