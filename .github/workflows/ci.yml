name: Retail_db — SQL Database CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/Retail_db/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'

jobs:
  build:
    name: Build & Validate SQL Project
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore NuGet packages
        run: dotnet restore src/Retail_db/Retail_db.sqlproj

      - name: Build SQL Project
        run: dotnet build src/Retail_db/Retail_db.sqlproj --configuration Release

      - name: Upload dacpac artifact
        uses: actions/upload-artifact@v4
        with:
          name: dacpac
          path: 'src/Retail_db/bin/Release/Retail_db.dacpac'
          retention-days: 30

  deploy_development:
    name: Deploy to Development
    runs-on: self-hosted
    needs: build
    steps:
      - name: Download dacpac artifact
        uses: actions/download-artifact@v4
        with:
          name: dacpac
          path: .

      - name: Install SqlPackage
        run: dotnet tool update --global microsoft.sqlpackage
        shell: powershell

      - name: Deploy to Development
        env:
          CONNECTION_STRING: ${{ secrets.DEVELOPMENT_CONNECTION_STRING }}
        run: sqlpackage /Action:Publish /SourceFile:Retail_db.dacpac /TargetConnectionString:"$env:CONNECTION_STRING" /p:BlockOnPossibleDataLoss=true
        shell: powershell

  deploy_uat:
    name: Deploy to UAT
    runs-on: self-hosted
    needs: deploy_development
    steps:
      - name: Download dacpac artifact
        uses: actions/download-artifact@v4
        with:
          name: dacpac
          path: .

      - name: Install SqlPackage
        run: dotnet tool update --global microsoft.sqlpackage
        shell: powershell

      - name: Deploy to UAT
        env:
          CONNECTION_STRING: ${{ secrets.UAT_CONNECTION_STRING }}
        run: sqlpackage /Action:Publish /SourceFile:Retail_db.dacpac /TargetConnectionString:"$env:CONNECTION_STRING" /p:BlockOnPossibleDataLoss=true
        shell: powershell

  deploy_production:
    name: Deploy to Production
    runs-on: self-hosted
    needs: deploy_uat
    environment: Production
    steps:
      - name: Download dacpac artifact
        uses: actions/download-artifact@v4
        with:
          name: dacpac
          path: .

      - name: Install SqlPackage
        run: dotnet tool update --global microsoft.sqlpackage
        shell: powershell

      - name: Deploy to Production
        env:
          CONNECTION_STRING: ${{ secrets.PRODUCTION_CONNECTION_STRING }}
        run: sqlpackage /Action:Publish /SourceFile:Retail_db.dacpac /TargetConnectionString:"$env:CONNECTION_STRING" /p:BlockOnPossibleDataLoss=true
        shell: powershell

